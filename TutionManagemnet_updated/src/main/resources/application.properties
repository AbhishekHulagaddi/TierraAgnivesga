# ======================
# SERVER (Railway PORT)
# ======================
server.port=${PORT:8080}
server.address=0.0.0.0

# ======================
# DATABASE (RAILWAY MYSQL - SAFE VERSION)
# ======================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari (prevents Railway startup DB race failures)
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maxLifetime=1800000

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ======================
# LOGGING (DEBUG DB ISSUES)
# ======================
logging.level.com.tuition=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ======================
# JWT
# ======================
app.jwt.secret=TuitionManagementSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# ======================
# FILE UPLOAD
# ======================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/notes

# ======================
# THYMELEAF
# ======================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ======================
# MAIL (FIXED PASSWORD FORMAT)
# ======================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply.tierra.agnivesha@gmail.com
spring.mail.password=noybnerpgbwaeuoy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.status=true
mail.from=noreply.tierra.agnivesha@gmail.com

# ======================
# OTP
# ======================
app.otp.expiry-minutes=5
