# ======================
# SERVER (Railway needs PORT env)
# ======================
server.port=${PORT:8080}
server.address=0.0.0.0

# ======================
# DATABASE (RAILWAY MYSQL)
# ======================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.jdbc=DEBUG
# ======================
# JWT (KEEP AS IS)
# ======================
app.jwt.secret=TuitionManagementSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# ======================
# FILE UPLOAD
# ======================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/notes

# ======================
# THYMELEAF
# ======================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ======================
# LOGGING
# ======================
logging.level.com.tuition=DEBUG
logging.level.org.springframework.security=INFO

# ======================
# MAIL (KEEP BUT FIX FORMAT)
# ======================
